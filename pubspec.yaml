name: zootocam
description: ZootoCam - ずーっと動物と。動物好きのためのカメラアプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  geolocator: ^12.0.0
  share_plus: ^9.0.0
  mapbox_maps_flutter: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  shaders:
    - shaders/film_pipeline.frag
    - shaders/legacy/film_iso800.frag
    - shaders/legacy/film_warm.frag
    - shaders/legacy/film_fuji400.frag
    - shaders/legacy/film_mono_hp5.frag
